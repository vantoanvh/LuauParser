<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LuauParser Documentation</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="docs-data.js" defer></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js" defer></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/lua.min.js" defer></script>
    <script src="docs.js" defer></script>
</head>
<body>
    <header class="site-header">
        <div class="header-row header-main">
            <a href="index.html" class="brand-link" aria-label="LuauParser documentation home">
                <span class="brand-icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24" role="presentation">
                        <path d="M5 4.5A2.5 2.5 0 0 1 7.5 2H20v18H7.5A2.5 2.5 0 0 0 5 22z"></path>
                        <path d="M5 4.5v17"></path>
                        <path d="M8.5 6.5h7"></path>
                        <path d="M8.5 10h7"></path>
                    </svg>
                </span>
                <span>LuauParser</span>
            </a>

            <div class="search-area">
                <input id="search-input" class="search-input" type="search" placeholder="Search docs..." autocomplete="off">
            </div>

            <a class="github-link" id="github-card" href="https://github.com" target="_blank" rel="noreferrer noopener">
                <span class="github-label">GitHub</span>
                <span class="github-name" id="github-name">repo</span>
                <span class="github-meta" id="github-stars">stars</span>
                <span class="github-meta" id="github-release">release</span>
            </a>
        </div>

        <nav class="header-row header-nav" aria-label="Documentation views">
            <button class="nav-tab" type="button" data-view="overview">Home</button>
            <button class="nav-tab" type="button" data-view="getting-started">Getting Started</button>
            <button class="nav-tab" type="button" data-view="ast">Ast</button>
            <button class="nav-tab" type="button" data-view="cst">Cst</button>
            <button class="nav-tab" type="button" data-view="core">Core</button>
            <button class="nav-tab" type="button" data-view="unions">Unions</button>
        </nav>

        <div class="search-results" id="search-results" hidden></div>
    </header>

    <main class="page-shell">
        <section class="hero-panel" id="hero-panel"></section>

        <div class="content-layout">
            <section class="content-column">
                <div class="resource-list" id="resource-list"></div>
            </section>

            <aside class="jump-panel">
                <div class="jump-title" id="jump-title">Nodes</div>
                <div class="jump-links" id="jump-links"></div>
            </aside>
        </div>
    </main>
</body>
</html>
